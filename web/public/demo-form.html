<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoFlow Demo Form</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 480px;
        margin: 40px auto;
        padding: 0 16px;
        background: #f6f7f8;
        color: #122;
      }
      h1 { font-size: 1.4rem; }
      label { display: block; margin: 12px 0 4px; font-weight: 600; font-size: 0.9rem; }
      input, textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccd;
        border-radius: 10px;
        font: inherit;
        box-sizing: border-box;
      }
      .hint { color: #667; font-size: 0.9rem; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <h1>Demo — Job / Checkout form</h1>
    <p class="hint">
      เปิดหน้านี้ด้วย Extension AutoFlow แล้วกดปุ่ม <strong>Auto-Fill with AI</strong> มุมขวาล่าง
    </p>
    <form>
      <label for="full_name">Full name</label>
      <input id="full_name" name="full_name" autocomplete="name" />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" />

      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel" autocomplete="tel" />

      <label for="company">Company</label>
      <input id="company" name="company" autocomplete="organization" />

      <label for="title">Job title</label>
      <input id="title" name="job_title" placeholder="Position" />

      <label for="address">Address</label>
      <input id="address" name="address" autocomplete="street-address" />

      <label for="city">City</label>
      <input id="city" name="city" autocomplete="address-level2" />

      <label for="country">Country</label>
      <input id="country" name="country" autocomplete="country-name" />

      <label for="summary">About you</label>
      <textarea id="summary" name="summary" rows="3"></textarea>
    </form>
  </body>
</html>
