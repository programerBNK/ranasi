<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ranasi Demo Form</title>
    <style>
      :root {
        --bg: #f4f7f6;
        --ink: #12201e;
        --muted: #5c6f6b;
        --line: #d5e0dc;
        --accent: #1f6f5b;
      }
      body {
        font-family: "Figtree", system-ui, sans-serif;
        max-width: 520px;
        margin: 48px auto;
        padding: 0 20px 80px;
        background: var(--bg);
        color: var(--ink);
      }
      h1 {
        font-size: 1.55rem;
        letter-spacing: -0.03em;
        margin: 0 0 8px;
      }
      .hint {
        color: var(--muted);
        font-size: 0.95rem;
        margin: 0 0 24px;
        line-height: 1.5;
      }
      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: 700;
        font-size: 0.85rem;
      }
      input,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        font: inherit;
        box-sizing: border-box;
        background: #fff;
      }
      input:focus,
      textarea:focus {
        outline: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <h1>Demo — Job / Checkout form</h1>
    <p class="hint">
      Open this page with the Ranasi extension, then press
      <strong>Auto-Fill with AI</strong> in the bottom-right corner.
    </p>
    <form>
      <label for="full_name">Full name</label>
      <input id="full_name" name="full_name" autocomplete="name" />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" />

      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel" autocomplete="tel" />

      <label for="company">Company</label>
      <input id="company" name="company" autocomplete="organization" />

      <label for="title">Job title</label>
      <input id="title" name="job_title" placeholder="Position" />

      <label for="address">Address</label>
      <input id="address" name="address" autocomplete="street-address" />

      <label for="city">City</label>
      <input id="city" name="city" autocomplete="address-level2" />

      <label for="country">Country</label>
      <input id="country" name="country" autocomplete="country-name" />

      <label for="summary">About you</label>
      <textarea id="summary" name="summary" rows="3"></textarea>
    </form>
  </body>
</html>
