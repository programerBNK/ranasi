services:
  db:
    image: postgres:16-alpine
    container_name: ranasi-pg
    environment:
      POSTGRES_USER: ranasi
      POSTGRES_PASSWORD: ranasi
      POSTGRES_DB: ranasi
    ports:
      - "5433:5432"
    volumes:
      - ranasi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ranasi -d ranasi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ranasi_pg:
